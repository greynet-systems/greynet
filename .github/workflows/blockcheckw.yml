name: blockcheckw

on:
  push:
    paths: ['blockcheckw/**']
  pull_request:
    paths: ['blockcheckw/**']

jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :blockcheckw:dockerTestAll
